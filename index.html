<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#800020">
    <title>Para Meu Amor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* Estilos Gerais */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Evita selecionar texto ao arrastar */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffe6e9; /* Rosa bem suave */
            color: #4a0011;
            overflow: hidden; /* Evita rolagem indesejada */
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
        }

        /* TELA DE BLOQUEIO */
        #lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20vh 20px 10vh 20px;
            background: linear-gradient(135deg, #ffc3ca 0%, #ff9eab 100%);
            z-index: 1;
            text-align: center;
        }

        #greeting {
            font-size: 2.5rem;
            color: #800020; /* Vermelho vinho */
            text-shadow: 1px 1px 4px rgba(255,255,255,0.5);
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* ÁREA DO SLIDER */
        .slider-wrapper {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        .slider-text {
            font-size: 1.1rem;
            color: #800020;
            margin-bottom: 15px;
            font-style: italic;
            opacity: 0.8;
            animation: slideHint 2s infinite;
        }

        @keyframes slideHint {
            0% { transform: translateX(-5px); opacity: 0.5; }
            50% { transform: translateX(5px); opacity: 1; }
            100% { transform: translateX(-5px); opacity: 0.5; }
        }

        /* Estilizando a barra de arrastar */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #800020;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(128, 0, 32, 0.4);
            transition: transform 0.1s;
            /* Ícone de setinha dentro do botão */
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }

        /* TELA DA MENSAGEM (CORTINA) */
        #message-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #800020; /* Fundo vinho na mensagem */
            color: #fff;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            
            /* Efeito de Cortina vindo de baixo */
            transform: translateY(100%);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); /* Animação bem fluida */
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }

        /* Classe ativada pelo JS para subir a cortina */
        #message-screen.unlocked {
            transform: translateY(0);
            border-radius: 0; /* Remove as bordas quando abre completamente */
        }

        .message-content {
            opacity: 0;
            transition: opacity 1s ease 0.5s; /* Aparece suavemente APÓS a cortina subir */
        }

        #message-screen.unlocked .message-content {
            opacity: 1;
        }

        .message-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff9eab;
        }

        .message-content p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .close-btn {
            margin-top: 40px;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid #ff9eab;
            color: #ff9eab;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-btn:active {
            background: #ff9eab;
            color: #800020;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 id="greeting">Olá, meu amor!</h1>
        
        <div class="slider-wrapper">
            <div class="slider-text">deslize para ler</div>
            <input type="range" id="unlock-slider" min="0" max="100" value="0">
        </div>
    </div>

    <div id="message-screen">
        <div class="message-content">
            <h2>Mensagem de Hoje</h2>
            <p id="daily-message">Carregando nosso momento...</p>
            <button class="close-btn" onclick="lockScreen()">Voltar</button>
        </div>
    </div>

    <script>
        // 1. LÓGICA DE TEMPO (Bom dia / Boa tarde / Boa noite)
        function updateGreeting() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const timeInDecimal = hours + (minutes / 60);

            let greeting = "Boa noite meu amor!"; // Padrão 19:01 às 05:00

            if (timeInDecimal > 5.0 && timeInDecimal <= 12.0) {
                greeting = "Bom dia meu amor!";
            } else if (timeInDecimal > 12.0 && timeInDecimal <= 19.0) {
                greeting = "Boa tarde meu amor!";
            }

            document.getElementById("greeting").innerText = greeting;
        }

        // 2. LÓGICA DO TEXTO DIÁRIO
        const messages = [
            "Não importa como comece o meu dia, ele sempre fica perfeito quando lembro de você.",
            "Você é a cor que faltava nos meus dias e a paz que minha alma precisava.",
            "Cada detalhe seu é um motivo a mais para eu me apaixonar diariamente.",
            "Se eu pudesse parar o tempo, seria no momento em que estou com você.",
            "Você é o meu primeiro pensamento ao acordar e o último antes de dormir.",
            "Amar você é a coisa mais fácil e natural que eu já fiz na vida."
            // Você pode adicionar dezenas de frases aqui!
        ];

        function updateDailyMessage() {
            const now = new Date();
            // Calcula o dia do ano (1 a 365) para mudar a frase automaticamente
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            // Seleciona a frase com base no dia (faz o loop na lista)
            const messageIndex = dayOfYear % messages.length;
            document.getElementById("daily-message").innerText = messages[messageIndex];
        }

        // 3. LÓGICA DO SLIDER (A cortina)
        const slider = document.getElementById("unlock-slider");
        const messageScreen = document.getElementById("message-screen");

        // Checa a posição do slider quando o usuário está arrastando
        slider.addEventListener("input", function() {
            // Se passar de 90%, destrava
            if (this.value > 90) {
                unlockScreen();
            }
        });

        // Se o usuário soltar antes de 90%, volta pro começo com efeito elástico
        slider.addEventListener("change", function() {
            if (this.value <= 90) {
                this.value = 0;
            }
        });
        slider.addEventListener("touchend", function() {
            if (this.value <= 90) {
                this.value = 0;
            }
        });

        function unlockScreen() {
            messageScreen.classList.add("unlocked");
            slider.value = 100; // Trava o slider no final
        }

        function lockScreen() {
            messageScreen.classList.remove("unlocked");
            setTimeout(() => {
                slider.value = 0; // Volta o slider pro começo após a cortina descer
            }, 500); // Tempo da animação do CSS
        }

        // Inicialização
        updateGreeting();
        updateDailyMessage();
        
        // Atualiza a saudação caso o app fique aberto na transição de horário
        setInterval(updateGreeting, 60000); // Checa a cada 1 minuto
    </script>
</body>
</html>
